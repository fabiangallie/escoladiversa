<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .title-box {
      background-color: #0074D9;
      color: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background-color: #0074D9;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #005fa3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box">
      <h1 class="title-grande">Panel de Informes</h1>
      <p class="title-secundario">Visualización de resultados y descargas</p>
    </div>

    <button class="btn" onclick="verGrafico()">Ver Sociograma Interactivo</button>
    <button class="btn" onclick="descargarInformeAula()">Descargar Informe de Aula (PDF)</button>
    <button class="btn" onclick="descargarInformeIndividual()">Descargar Informe Individual (PDF)</button>
    <button class="btn" onclick="descargarExcel()">Descargar Datos en Excel</button>
  </div>

  <script>
    function verGrafico() {
      window.location.href = "sociograma.html";
    }

    function descargarInformeAula() {
      window.location.href = "descargas/informe_aula.pdf";
    }

    function descargarInformeIndividual() {
      window.location.href = "descargas/informe_individual.pdf";
    }

    function descargarExcel() {
      window.location.href = "descargas/resultados_sociometricos.xlsx";
    }
  </script>
</body>
</html>
