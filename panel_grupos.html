<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Grupos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Panel del Profesorado</h1>

    <div>
        <label for="nombreGrupo">Nombre del grupo:</label>
        <input type="text" id="nombreGrupo" placeholder="Ej: 5ºB">
    </div>

    <div>
        <label for="alumnos">Listado de alumnos (separados por coma):</label><br>
        <textarea id="alumnos" rows="5" cols="50" placeholder="Ej: Ana, Luis, Marta, Pablo"></textarea>
    </div>

    <button onclick="guardarDesdeFormulario()">Guardar grupo</button>

    <script>
        function guardarGrupoEnServidor(grupo) {
            fetch("guardar_grupo.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(grupo)
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "ok") {
                    alert("Grupo guardado correctamente");
                } else {
                    alert("Error al guardar grupo");
                }
            })
            .catch(err => {
                alert("Error de conexión con el servidor.");
                console.error(err);
            });
        }

        function guardarDesdeFormulario() {
            const nombre = document.getElementById("nombreGrupo").value.trim();
            const lista = document.getElementById("alumnos").value.trim();

            if (!nombre || !lista) {
                alert("Por favor, completa el nombre del grupo y al menos un alumno.");
                return;
            }

            const alumnos = lista.split(",").map(nombre => nombre.trim()).filter(n => n !== "");

            const grupo = {
                nombre: nombre,
                alumnos: alumnos
            };

            guardarGrupoEnServidor(grupo);
        }
    </script>
</body>
</html>
