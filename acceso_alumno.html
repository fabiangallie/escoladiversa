<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Alumno</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 2rem;
    }

    select, button {
      margin: 1rem;
      padding: 0.5rem;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <h1>Accede al Sociograma</h1>

  <label for="cursoAlumno">Selecciona tu curso:</label><br />
  <select id="cursoAlumno">
    <option value="">--Selecciona--</option>
    <option value="1A">1ºA</option>
    <option value="1B">1ºB</option>
    <option value="2A">2ºA</option>
    <!-- Añade más cursos según sea necesario -->
  </select>
  <br /><br />

  <label for="nombreAlumno">Selecciona tu nombre:</label><br />
  <select id="nombreAlumno">
    <option value="">--Selecciona--</option>
    <option value="Lucas">Lucas</option>
    <option value="Ana">Ana</option>
    <option value="María">María</option>
    <!-- Aquí se debería rellenar dinámicamente según el curso -->
  </select>

  <br /><br />
  <button onclick="accederSociograma()">Siguiente</button>

  <script>
    function accederSociograma() {
      const nombre = document.getElementById("nombreAlumno").value;
      const curso = document.getElementById("cursoAlumno").value;

      if (!nombre || !curso) {
        alert("Por favor, selecciona tu curso y tu nombre.");
        return;
      }

      localStorage.setItem("nombreAlumno", nombre);
      localStorage.setItem("cursoAlumno", curso);

      // Redirige al sociograma
      window.location.href = "sociograma/index.html";
    }
  </script>
</body>
</html>
