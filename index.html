<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sociograma Escola Diversa</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 120px;
      margin-bottom: 20px;
    }
    .title-box .title-grande {
      font-size: 2.5em;
      margin: 0;
    }
    .title-box .title-secundario {
      font-size: 1.5em;
      color: #666;
      margin: 5px 0 30px;
    }
    .button-group .btn {
      display: inline-block;
      padding: 10px 20px;
      font-size: 1em;
      text-decoration: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .button-group .btn:hover {
      background-color: #0056b3;
    }
    footer {
      text-align: center;
      padding: 20px 10px;
      font-size: 0.9em;
      background-color: #f0f0f0;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">


    <div class="title-box">
      <h1 class="title-grande">Escola Diversa</h1>
      <h2 class="title-secundario">Sociograma</h2>
    </div>

    <div class="button-group">
      <a href="seleccion.html" class="btn">Entrar</a>
    </div>
  </div>

  <footer>
    @2025 escoladiversa. Proyecto sociométrico educativo creado por OpenAI; Colaborador pedagógico Fabián Gallié
  </footer>
</body>
</html>
