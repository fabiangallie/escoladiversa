<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pregunta 1</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .nombres-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .nombre-item {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f0f0f0;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nombre-item img {
      height: 30px;
    }

    .drop-zona {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .casilla {
      width: 100px;
      height: 60px;
      border: 2px dashed #888;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: #fff;
    }

    .casilla span {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .centrado {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Pregunta 1</h1>
      <h2 class="title-secundario">¿Con quién te gusta jugar en el patio?</h2>
    </div>

    <div class="nombres-container" id="nombres" ondragover="event.preventDefault()" ondrop="handleDropBack(event)">
      <!-- Aquí se cargarán los nombres -->
    </div>

    <div class="drop-zona" id="zona-eleccion">
      <!-- Casillas numeradas -->
      <div class="casilla" data-pos="1"><span>1º</span></div>
      <div class="casilla" data-pos="2"><span>2º</span></div>
      <div class="casilla" data-pos="3"><span>3º</span></div>
      <div class="casilla" data-pos="4"><span>4º</span></div>
      <div class="casilla" data-pos="5"><span>5º</span></div>
    </div>

    <div class="centrado">
      <button class="btn" onclick="siguiente()">Siguiente</button>
    </div>
  </div>

<script>
  const nombres = JSON.parse(localStorage.getItem("nombresGrupo") || "[]");
  const contenedor = document.getElementById("nombres");
  let selectedName = null;

  // 1) Crear elementos arrastrables / seleccionables
  nombres.forEach(nombre => {
    const item = document.createElement("div");
    item.className = "nombre-item";
    item.textContent = nombre;
    item.dataset.nombre = nombre;

    // Drag por desktop
    item.draggable = true;
    item.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", nombre);
    });

    // Selección por touch/mobile
    item.addEventListener("click", () => {
      // Si ya estaba seleccionado, deselecciona
      if (selectedName === item) {
        item.classList.remove("selected");
        selectedName = null;
      } else {
        // Deselecciona anterior
        document.querySelectorAll(".nombre-item.selected")
                .forEach(el => el.classList.remove("selected"));
        // Selecciona este
        item.classList.add("selected");
        selectedName = item;
      }
    });

    contenedor.appendChild(item);
  });

  // 2) Configura las casillas
  document.querySelectorAll(".casilla").forEach(caja => {
    // Desktop drag&drop
    caja.addEventListener("dragover", e => e.preventDefault());
    caja.addEventListener("drop", e => {
      e.preventDefault();
      const nombre = e.dataTransfer.getData("text/plain");
      colocarNombreEnCasilla(nombre, caja);
    });

    // Mobile tap
    caja.addEventListener("click", () => {
      if (!selectedName) return;
      colocarNombreEnCasilla(selectedName.dataset.nombre, caja);
      // Deselecciona tras colocar
      selectedName.classList.remove("selected");
      selectedName = null;
    });
  });

  // 3) Función para mover el nombre, tanto en mobile como en desktop
  function colocarNombreEnCasilla(nombre, caja) {
    // Evitar duplicados en otras casillas
    document.querySelectorAll(".casilla").forEach(c => {
      const n = c.querySelector(".nombre-item");
      if (n && n.dataset.nombre === nombre) {
        c.innerHTML = `<span>${c.dataset.pos}º</span>`;
      }
    });
    // Quitar de la lista superior si existe ahí
    [...contenedor.children].forEach(el => {
      if (el.dataset.nombre === nombre) el.remove();
    });
    // Añadir al recuadro
    const nuevo = document.createElement("div");
    nuevo.className = "nombre-item";
    nuevo.textContent = nombre;
    nuevo.dataset.nombre = nombre;
    // Permitir devolver con click
    nuevo.addEventListener("click", () => {
      // Si tocan en la casilla, devuelven la tarjeta
      contenedor.appendChild(nuevo);
      caja.innerHTML = `<span>${caja.dataset.pos}º</span>`;
    });
    caja.innerHTML = `<span>${caja.dataset.pos}º</span>`;
    caja.appendChild(nuevo);
  }

  // 4) Guardar y navegación
  function siguiente() {
    const elecciones = [...document.querySelectorAll(".casilla")].map(c => {
      const n = c.querySelector(".nombre-item");
      return n ? n.dataset.nombre : null;
    });
    localStorage.setItem("respuesta" + X, JSON.stringify(elecciones));
    // sustituye X por el número de pregunta y luego ajusta la página siguiente
    window.location.href = "pregunta" + (X+1) + ".html";
  }
  function anterior() {
    window.location.href = "pregunta" + (X-1) + ".html";
  }
</script>

</body>
</html>
