<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pregunta 1</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .alumnos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 30px;
    }

    .alumno {
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px;
      background-color: #f9f9f9;
      cursor: grab;
    }

    .alumno img {
      width: 50px;
      height: 50px;
    }

    .zona-seleccion {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .slot {
      border: 2px dashed #aaa;
      border-radius: 8px;
      width: 100px;
      height: 100px;
      text-align: center;
      line-height: 1.2;
      padding: 5px;
      background-color: #fff;
    }

    .slot h3 {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Pregunta 1</h1>
      <h2 class="title-secundario">Hola, <span id="nombre-nino"></span></h2>
      <p>¿A qué compañeros/as escogerías para trabajar en equipo?</p>
    </div>

    <div class="alumnos-grid" id="lista-alumnos">
      <!-- Aquí se insertarán los compañeros con JS -->
    </div>

    <div class="zona-seleccion">
      <div class="slot" data-pos="1"><h3>1º</h3></div>
      <div class="slot" data-pos="2"><h3>2º</h3></div>
      <div class="slot" data-pos="3"><h3>3º</h3></div>
      <div class="slot" data-pos="4"><h3>4º</h3></div>
      <div class="slot" data-pos="5"><h3>5º</h3></div>
    </div>

    <div class="centrado">
      <button class="btn" onclick="atras()">Atrás</button>
      <button class="btn" onclick="siguiente()">Siguiente</button>
    </div>
  </div>

  <script>
    const nombre = localStorage.getItem("nombreAlumno") || "Nombre";
    const grupo = localStorage.getItem("grupoSeleccionado");
    document.getElementById("nombre-nino").textContent = nombre;

    const alumnosContainer = document.getElementById("lista-alumnos");
    const slots = document.querySelectorAll(".slot");

    fetch("../grupos.json")
      .then(res => res.json())
      .then(data => {
        const alumnos = data[grupo].filter(n => n !== nombre);
        alumnos.forEach(nombre => {
          const div = document.createElement("div");
          div.className = "alumno";
          div.draggable = true;
          div.innerHTML = `<img src="silueta1.png" alt="avatar"><br>${nombre}`;
          div.dataset.nombre = nombre;
          div.addEventListener("dragstart", dragStart);
          alumnosContainer.appendChild(div);
        });
      });

    function dragStart(e) {
      e.dataTransfer.setData("text/plain", e.target.dataset.nombre);
    }

    slots.forEach(slot => {
      slot.addEventListener("dragover", e => e.preventDefault());
      slot.addEventListener("drop", e => {
        e.preventDefault();
        const nombre = e.dataTransfer.getData("text/plain");
        if (slot.textContent.includes(nombre)) return;

        const existing = Array.from(slots).find(s => s.textContent.includes(nombre));
        if (existing) existing.innerHTML = `<h3>${existing.dataset.pos}º</h3>`; // vaciar si estaba

        slot.innerHTML = `<h3>${slot.dataset.pos}º</h3>${nombre}`;
      });
    });

    function atras() {
      window.location.href = "bienvenida.html";
    }

    function siguiente() {
      // Guardar selección y continuar
      const seleccion = Array.from(slots).map(slot => slot.textContent.replace(/\dº/, "").trim()).filter(Boolean);
      localStorage.setItem("respuesta1", JSON.stringify(seleccion));
      window.location.href = "pregunta2.html";
    }
  </script>
</body>
</html>
