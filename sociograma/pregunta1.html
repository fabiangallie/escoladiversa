<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pregunta 1</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .alumnos-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .alumno {
      padding: 5px 10px;
      background-color: #eef;
      border: 1px solid #88a;
      border-radius: 5px;
      cursor: grab;
    }

    .caja-eleccion {
      border: 2px dashed #aaa;
      padding: 10px;
      min-height: 80px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .caja-eleccion .posicion {
      width: 60px;
      height: 60px;
      border: 1px solid #888;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: #fdfdfd;
      font-weight: bold;
      position: relative;
    }

    .caja-eleccion .posicion.dragover {
      background-color: #ddf;
    }

    .caja-eleccion .nombre-alumno {
      font-weight: normal;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">¿Con quién te gusta jugar en el recreo?</h1>
      <p>Arrastra hasta 5 compañeros por orden de preferencia (puedes dejar posiciones vacías si lo prefieres).</p>
    </div>

    <div class="alumnos-container" id="alumnos-container">
      <!-- Alumnos disponibles -->
    </div>

    <div class="caja-eleccion" id="caja-eleccion">
      <!-- Espacios numerados -->
    </div>

    <div style="text-align: center;">
      <button onclick="location.href='pregunta2.html'" class="btn">Siguiente</button>
    </div>
  </div>

  <script>
    const alumnosContainer = document.getElementById("alumnos-container");
    const cajaEleccion = document.getElementById("caja-eleccion");

    const nombresGrupo = JSON.parse(localStorage.getItem("nombresGrupo")) || [];

    // Crear tarjetas de alumnos
    nombresGrupo.forEach(nombre => {
      const div = document.createElement("div");
      div.classList.add("alumno");
      div.textContent = nombre;
      div.draggable = true;
      div.addEventListener("dragstart", (e) => {
        e.dataTransfer.setData("text/plain", nombre);
      });
      alumnosContainer.appendChild(div);
    });

    // Crear posiciones de elección
    for (let i = 1; i <= 5; i++) {
      const slot = document.createElement("div");
      slot.classList.add("posicion");
      slot.dataset.index = i;
      slot.textContent = `${i}º`;

      slot.addEventListener("dragover", (e) => {
        e.preventDefault();
        slot.classList.add("dragover");
      });

      slot.addEventListener("dragleave", () => {
        slot.classList.remove("dragover");
      });

      slot.addEventListener("drop", (e) => {
        e.preventDefault();
        slot.classList.remove("dragover");

        const nombre = e.dataTransfer.getData("text/plain");

        // Evitar duplicados
        const existentes = cajaEleccion.querySelectorAll(".nombre-alumno");
        for (let nodo of existentes) {
          if (nodo.textContent === nombre) return;
        }

        // Añadir nombre dentro del slot
        const nombreDiv = document.createElement("div");
        nombreDiv.className = "nombre-alumno";
        nombreDiv.textContent = nombre;

        // Eliminar nombre anterior si hay
        const anterior = slot.querySelector(".nombre-alumno");
        if (anterior) anterior.remove();

        slot.appendChild(nombreDiv);
      });

      cajaEleccion.appendChild(slot);
    }
  </script>
</body>
</html>
