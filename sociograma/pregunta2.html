<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pregunta 2</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .alumnos, .seleccionados {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 20px 0;
    }
    button {
      padding: 10px 15px;
      border: none;
      background-color: #007acc;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .seleccionados button {
      background-color: #4caf50;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>2. ¿Quiénes son tus mejores amigos o amigas?</h2>

    <h3>Haz clic en hasta 5 compañeros</h3>

    <div class="alumnos">
      <button onclick="seleccionar('Ana')">Ana</button>
      <button onclick="seleccionar('Luis')">Luis</button>
      <button onclick="seleccionar('Carla')">Carla</button>
      <button onclick="seleccionar('Marcos')">Marcos</button>
      <button onclick="seleccionar('Paula')">Paula</button>
      <button onclick="seleccionar('Diego')">Diego</button>
      <button onclick="seleccionar('Sofía')">Sofía</button>
      <button onclick="seleccionar('Hugo')">Hugo</button>
      <button onclick="seleccionar('Marta')">Marta</button>
      <button onclick="seleccionar('Pablo')">Pablo</button>
    </div>

    <h4>Seleccionados:</h4>
    <div class="seleccionados" id="seleccionados"></div>

    <br>
    <a href="pregunta3.html" class="btn">Siguiente</a>
  </div>

  <script>
    let seleccionados = [];

    function seleccionar(nombre) {
      if (seleccionados.includes(nombre)) return;

      if (seleccionados.length >= 5) {
        alert("Solo puedes seleccionar hasta 5 compañeros.");
        return;
      }

      seleccionados.push(nombre);
      actualizarSeleccionados();
    }

    function actualizarSeleccionados() {
      const lista = document.getElementById("seleccionados");
      lista.innerHTML = "";
      seleccionados.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.onclick = () => quitar(nombre);
        lista.appendChild(btn);
      });
    }

    function quitar(nombre) {
      seleccionados = seleccionados.filter(n => n !== nombre);
      actualizarSeleccionados();
    }
  </script>
</body>
</html>
