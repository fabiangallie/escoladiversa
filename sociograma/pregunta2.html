<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pregunta 4</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .nombres-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      justify-content: center;
    }

    .nombre-item {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f0f0f0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nombre-item.selected {
      background-color: #FF4136;
      color: white;
      font-weight: bold;
    }

    .nombre-item img {
      height: 30px;
    }

    .centrado {
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Pregunta 4</h1>
      <h2 class="title-secundario">¿Con quién no te llevas tan bien?</h2>
    </div>

    <div class="nombres-container" id="nombres"></div>

    <div class="centrado">
      <button class="btn" onclick="siguiente()">Finalizar</button>
    </div>
  </div>

  <script>
    const nombres = JSON.parse(localStorage.getItem("nombresGrupo") || "[]");
    const contenedor = document.getElementById("nombres");

    nombres.forEach(nombre => {
      const item = document.createElement("div");
      item.className = "nombre-item";
      item.dataset.nombre = nombre;
      item.innerHTML = `<img src="silueta1.png" alt="icono">${nombre}`;

      item.addEventListener("click", () => {
        item.classList.toggle("selected");
      });

      contenedor.appendChild(item);
    });

    function siguiente() {
      const seleccionados = Array.from(document.querySelectorAll(".nombre-item.selected"))
        .map(item => item.dataset.nombre);
      localStorage.setItem("respuesta4", JSON.stringify(seleccionados));
      window.location.href = "gracias.html";
    }
  </script>
</body>
</html>
