<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Informe de Grupos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f4;
    }
    #contenido {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    h1 {
      text-align: center;
    }
    canvas {
      max-width: 600px;
      margin: auto;
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #eee;
    }
    .botones {
      text-align: center;
      margin-top: 20px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="botones">
  <button onclick="cargarDatos()">📂 Cargar grupos1.json</button>
  <button onclick="descargarPDF()">⬇️ Descargar PDF</button>
</div>

<div id="contenido">
  <h1>Informe de Grupos</h1>
  <canvas id="grafico"></canvas>
  <div id="tabla"></div>
</div>

<script>
  let chartInstance;

  function cargarDatos() {
    fetch('grupos1.json')
      .then(response => {
        if (!response.ok) throw new Error('No se pudo cargar grupos1.json');
        return response.json();
      })
      .then(data => {
        mostrarGrafico(data);
        mostrarTabla(data);
      })
      .catch(err => {
        alert("Error: " + err.message);
      });
  }

  function mostrarGrafico(datos) {
    const ctx = document.getElementById('grafico').getContext('2d');
    const etiquetas = datos.map(grupo => grupo.nombre);
    const valores = datos.map(grupo => grupo.valor);

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: etiquetas,
        datasets: [{
          label: 'Valor por Grupo',
          data: valores,
          backgroundColor: 'rgba(75, 192, 192, 0.6)'
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }

  function mostrarTabla(datos) {
    let html = `<table>
      <thead><tr><th>Grupo</th><th>Valor</th></tr></thead><tbody>`;
    datos.forEach(grupo => {
      html += `<tr><td>${grupo.nombre}</td><td>${grupo.valor}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('tabla').innerHTML = html;
  }

  function descargarPDF() {
    const element = document.getElementById('contenido');
    html2pdf().from(element).save('informe.pdf');
  }
</script>

</body>
</html>
