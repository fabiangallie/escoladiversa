<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    #panelInicial, #panelGrupos, #informe {
      display: none;
    }
    .icono-atencion {
      color: red;
      font-weight: bold;
      margin-left: 5px;
    }
    .boton {
      margin-top: 10px;
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
    .boton:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>Generador de Informes</h1>

  <!-- Pantalla inicial -->
  <div id="pantallaInicial">
    <input type="file" id="cargarJSON" accept=".json">
    <button class="boton" id="botonCargar">Seleccionar grupo</button>
  </div>

  <!-- Panel selección de grupo -->
  <div id="panelGrupos">
    <h2>Selecciona un grupo</h2>
    <select id="selectorGrupo"></select>
    <button class="boton" id="verInforme">Ver Informe</button>
  </div>

  <!-- Panel informe -->
  <div id="informe"></div>

  <script>
    let datos = {};
    let grupoSeleccionado = "";

    document.getElementById("botonCargar").addEventListener("click", () => {
      const fileInput = document.getElementById("cargarJSON");
      const file = fileInput.files[0];
      if (!file) {
        alert("Por favor, selecciona un archivo JSON.");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        datos = JSON.parse(e.target.result);
        mostrarSelectorGrupos();
      };
      reader.readAsText(file);
    });

    function mostrarSelectorGrupos() {
      const selector = document.getElementById("selectorGrupo");
      selector.innerHTML = "";
      Object.keys(datos).forEach(grupo => {
        const option = document.createElement("option");
        option.value = grupo;
        option.textContent = grupo;
        selector.appendChild(option);
      });

      document.getElementById("pantallaInicial").style.display = "none";
      document.getElementById("panelGrupos").style.display = "block";
    }

    document.getElementById("verInforme").addEventListener("click", () => {
      grupoSeleccionado = document.getElementById("selectorGrupo").value;
      mostrarInforme();
    });

    function mostrarInforme() {
      const grupo = datos[grupoSeleccionado];
      const contenedor = document.getElementById("informe");
      contenedor.innerHTML = `<h2>Informe del grupo: ${grupoSeleccionado}</h2>`;

      grupo.alumnos.forEach(alumno => {
        contenedor.innerHTML += `
          <h3>${alumno.nombre} ${alumno.atencion ? '<span class="icono-atencion">⚠️</span>' : ''}</h3>
          <p><strong>Observaciones:</strong> ${alumno.observaciones || "Ninguna"}</p>
          <p><strong>Necesidades:</strong> ${alumno.necesidades || "No especificadas"}</p>
        `;
      });

      contenedor.innerHTML += `
        <h3>Resumen del grupo</h3>
        <p>${grupo.resumen || "Sin resumen disponible."}</p>

        <h3>Propuesta de intervención</h3>
        <p>
          Se sugiere trabajar los siguientes aspectos:
          <ul>
            <li><strong>Educación emocional:</strong> Reconocimiento y gestión de emociones.</li>
            <li><strong>Educación en valores:</strong> Respeto, empatía, cooperación.</li>
            <li><strong>Dinámicas de grupo y aula:</strong> Actividades que fomenten la cohesión grupal y resolución de conflictos.</li>
          </ul>
        </p>
      `;

      document.getElementById("panelGrupos").style.display = "none";
      contenedor.style.display = "block";
    }
  </script>
</body>
</html>
