<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .tabs { display: flex; justify-content: center; margin: 1em 0; }
    .tab-btn {
      padding: 0.8em 1.5em; margin: 0 0.5em; border: none;
      background-color: #d0e4ff; cursor: pointer;
      border-radius: 8px; font-weight: bold;
    }
    .tab-btn.active { background-color: #4285f4; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .info-box {
      background-color: #f4faff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
    }
    .btn { margin: 0.25em; padding: 0.5em 1em; }
    canvas { max-width: 600px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Panel de Informes</h1>
    </div>

    <form class="form">
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe general</button>
      <button class="tab-btn" onclick="mostrarTab('graficas')">Gráficas</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen de desempeño del grupo.</p>
      </div>
    </div>

    <div id="graficas" class="tab-content">
      <div class="info-box" id="informe-graficas">
        <canvas id="grafico-clima"></canvas>
      </div>
    </div>
  </div>

  <script>
    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      for (let i = 0; i < localStorage.length; i++) {
        const clave = localStorage.key(i);
        if (clave.includes(" - ")) {
          const option = document.createElement("option");
          option.value = clave;
          option.textContent = clave;
          select.appendChild(option);
        }
      }
    }

    function cargarInformes() {
      const grupoKey = document.getElementById("grupo-select").value;
      if (!grupoKey) return;
      const grupo = JSON.parse(localStorage.getItem(grupoKey));
      const individualDiv = document.getElementById("informe-individual");
      individualDiv.innerHTML = '<p>Selecciona un alumno:</p>';
      grupo.alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.className = "btn";
        btn.onclick = () => mostrarInformeAlumno(nombre, grupo);
        individualDiv.appendChild(btn);
      });

      document.getElementById("informe-general").innerHTML = `
        <h3>Grupo: ${grupo.curso}</h3>
        <p>Total de alumnos: ${grupo.alumnos.length}</p>
        <ul>
          <li><b>Popular:</b> Ana</li>
          <li><b>Rechazado:</b> Luis</li>
          <li><b>Aislado:</b> Marcos</li>
        </ul>
        <p>Recomendación: trabajar actividades de cohesión e inclusión grupal.</p>
      `;

      generarGraficoClima();
    }

    function mostrarInformeAlumno(nombre, grupo) {
      const div = document.getElementById("informe-individual");
      div.innerHTML = `
        <h3>Informe de ${nombre}</h3>
        <p><b>Amistades mutuas:</b> Pedro, Marta</p>
        <p><b>Amistades unilaterales:</b> Clara</p>
        <p><b>Rechazos:</b> Luis, Juan</p>
        <p><b>Posición sociométrica:</b> Aceptado</p>
        <p><i>${nombre} es un alumno con buena integración en el grupo, con amistades mutuas y pocos rechazos.</i></p>
        <br>
        <button class="btn" onclick="cargarInformes()">Volver a lista de alumnos</button>
      `;
    }

    function generarGraficoClima() {
      const ctx = document.getElementById('grafico-clima').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Aceptación', 'Cohesión', 'Inclusión', 'Rechazo', 'Aislamiento'],
          datasets: [{
            label: 'Nivel en el grupo',
            data: [8, 6, 7, 2, 1],
            backgroundColor: [
              '#4caf50', '#2196f3', '#ffc107', '#f44336', '#9e9e9e'
            ]
          }]
        },
        options: {
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
