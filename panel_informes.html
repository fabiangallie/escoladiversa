<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .tabs {
      display: flex;
      justify-content: center;
      margin: 1em 0;
    }

    .tab-btn {
      padding: 0.8em 1.5em;
      margin: 0 0.5em;
      border: none;
      background-color: #d0e4ff;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
    }

    .tab-btn.active {
      background-color: #4285f4;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .info-box {
      background-color: #f4faff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
    }

    canvas {
      max-width: 400px;
      margin-top: 1em;
    }

    .btn {
      margin: 0.3em;
      padding: 0.5em 1em;
      border: none;
      background-color: #90caf9;
      color: black;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Panel de Informes</h1>
    </div>

    <form class="form">
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe general</button>
      <button class="tab-btn" onclick="mostrarTab('graficas')">Gráficas</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
      <button class="btn" onclick="descargarPDF()">Descargar todos en PDF</button>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen de desempeño del grupo.</p>
      </div>
    </div>

    <div id="graficas" class="tab-content">
      <div class="info-box" id="informe-graficas">
        <p>Gráficas de rendimiento (por implementar).</p>
      </div>
    </div>
  </div>

  <script>
    const ejemploGrupo = {
      curso: "6º Primaria",
      alumnos: ["Lucía", "Carlos", "María", "Pedro"],
      resultados: {
        "Lucía": { simpatía: 8, rechazo: 2, popularidad: 9 },
        "Carlos": { simpatía: 4, rechazo: 6, popularidad: 3 },
        "María": { simpatía: 7, rechazo: 3, popularidad: 6 },
        "Pedro": { simpatía: 5, rechazo: 4, popularidad: 5 },
      }
    };

    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      const option = document.createElement("option");
      option.value = "ejemplo";
      option.textContent = ejemploGrupo.curso;
      select.appendChild(option);
    }

    function cargarInformes() {
      const grupoKey = document.getElementById("grupo-select").value;
      if (!grupoKey) return;

      const grupo = ejemploGrupo;
      const individualDiv = document.getElementById("informe-individual");
      individualDiv.innerHTML = '<p>Selecciona un alumno:</p>';
      
      grupo.alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.className = "btn";
        btn.onclick = () => mostrarInformeAlumno(nombre, grupo.resultados[nombre]);
        individualDiv.appendChild(btn);
      });
    }

    function mostrarInformeAlumno(nombre, datos) {
      const div = document.getElementById("informe-individual");
      div.innerHTML = `
        <h3>${nombre}</h3>
        <p>Simpatía: ${datos.simpatía}</p>
        <p>Rechazo: ${datos.rechazo}</p>
        <p>Popularidad: ${datos.popularidad}</p>
        <canvas id="grafico-${nombre}"></canvas>
      `;

      const ctx = document.getElementById(`grafico-${nombre}`).getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Simpatía", "Rechazo", "Popularidad"],
          datasets: [{
            label: "Puntuaciones",
            data: [datos.simpatía, datos.rechazo, datos.popularidad],
            backgroundColor: ["#66bb6a", "#ef5350", "#42a5f5"]
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: {
              beginAtZero: true,
              max: 10
            }
          }
        }
      });
    }

    async function descargarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const alumnos = ejemploGrupo.alumnos;
      const resultados = ejemploGrupo.resultados;

      alumnos.forEach((nombre, i) => {
        const datos = resultados[nombre];
        if (i !== 0) doc.addPage();

        doc.setFontSize(16);
        doc.text(`Informe Individual: ${nombre}`, 20, 20);
        doc.setFontSize(12);
        doc.text(`Simpatía: ${datos.simpatía}`, 20, 40);
        doc.text(`Rechazo: ${datos.rechazo}`, 20, 50);
        doc.text(`Popularidad: ${datos.popularidad}`, 20, 60);
      });

      doc.save("informes_individuales.pdf");
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
