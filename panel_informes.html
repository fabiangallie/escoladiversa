<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Informes Sociométricos - Fabián Gallié</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background: #f0f4f8;
    }
    header {
      background: #0077b6;
      color: white;
      padding: 1rem;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    h1 {
      margin: 0;
    }
    .selector {
      display: flex;
      overflow-x: auto;
      background: #caf0f8;
      padding: 0.5rem;
    }
    .selector button {
      margin: 0.25rem;
      padding: 0.5rem 1rem;
      border: none;
      background: #00b4d8;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
    .selector button:hover {
      background: #0096c7;
    }
    .informe {
      padding: 1rem;
      background: white;
      margin: 1rem;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .cuadro-titulo {
      background: #d0f0fd;
      border-left: 6px solid #00b4d8;
      padding: 0.75rem;
      margin-bottom: 1rem;
      font-weight: bold;
      font-size: 1.2rem;
    }
    canvas {
      max-width: 100%;
      height: auto;
    }
    .descargar {
      margin-top: 1rem;
      text-align: right;
    }
    .descargar button {
      padding: 0.5rem 1rem;
      background: #0077b6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Informes Sociométricos - Fabián Gallié</h1>
</header>

<div class="selector" id="alumnoSelector">
  <!-- Se generan botones de alumnos por JS -->
</div>

<div id="contenedorInforme" class="informe">
  <!-- Informe cargado por JS -->
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const alumnos = [
  "Ana", "Luis", "María", "Carlos", "Lucía",
  "Diego", "Sofía", "Pablo", "Carmen", "Iván"
];

const informes = alumnos.map((nombre, i) => ({
  nombre,
  elecciones: ["Amigo1", "Amigo2"],
  rechazos: ["Rechazo1"],
  estatus: ["Estatus positivo"],
  nivel: "Popularidad media",
  resumen: `El alumno/a ${nombre} se posiciona como una figura relevante en el grupo, con relaciones sociales estables. Su nivel de aceptación es adecuado.`,
  grafico: {
    afinidad: Math.floor(Math.random()*100),
    rechazo: Math.floor(Math.random()*100),
    participacion: Math.floor(Math.random()*100),
    popularidad: Math.floor(Math.random()*100)
  }
}));

function generarBotones() {
  const cont = document.getElementById("alumnoSelector");
  alumnos.forEach((nombre, i) => {
    const btn = document.createElement("button");
    btn.textContent = nombre;
    btn.onclick = () => mostrarInforme(i);
    cont.appendChild(btn);
  });
}

function mostrarInforme(idx) {
  const alumno = informes[idx];
  const cont = document.getElementById("contenedorInforme");
  cont.innerHTML = `
    <div class="cuadro-titulo">Informe de ${alumno.nombre}</div>
    <canvas id="grafico-${idx}" width="300" height="150"></canvas>
    <p><strong>Elecciones:</strong> ${alumno.elecciones.join(", ")}</p>
    <p><strong>Rechazos:</strong> ${alumno.rechazos.join(", ")}</p>
    <p><strong>Estatus:</strong> ${alumno.estatus.join(", ")}</p>
    <p><strong>Nivel de popularidad:</strong> ${alumno.nivel}</p>
    <p><strong>Resumen:</strong> ${alumno.resumen}</p>
    <div class="descargar">
      <button onclick="descargarInforme('${alumno.nombre}')">Descargar informe de ${alumno.nombre}</button>
    </div>
  `;

  const ctx = document.getElementById(`grafico-${idx}`).getContext("2d");
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ["Afinidad", "Rechazo", "Participación", "Popularidad"],
      datasets: [{
        label: "Índices",
        data: [
          alumno.grafico.afinidad,
          alumno.grafico.rechazo,
          alumno.grafico.participacion,
          alumno.grafico.popularidad
        ],
        backgroundColor: ['#0077b6', '#d00000', '#90be6d', '#f9c74f']
      }]
    },
    options: {
      scales: {
        y: { beginAtZero: true, max: 100 }
      }
    }
  });
}

function descargarInforme(nombre) {
  const contenido = document.getElementById("contenedorInforme").innerText;
  const blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
  const enlace = document.createElement("a");
  enlace.href = URL.createObjectURL(blob);
  enlace.download = `Informe_${nombre}.txt`;
  enlace.click();
}

generarBotones();
mostrarInforme(0); // mostrar primero
</script>

</body>
</html>
