<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .tabs {
      display: flex;
      justify-content: center;
      margin: 1em 0;
    }

    .tab-btn {
      padding: 0.8em 1.5em;
      margin: 0 0.5em;
      border: none;
      background-color: #d0e4ff;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
    }

    .tab-btn.active {
      background-color: #4285f4;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .info-box {
      background-color: #f4faff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
    }

    .btn {
      margin: 0.3em;
      padding: 0.5em 1em;
      border: none;
      background-color: #4285f4;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Panel de Informes</h1>
    </div>

    <form class="form">
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe general</button>
      <button class="tab-btn" onclick="mostrarTab('graficas')">Gráficas</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen de desempeño del grupo.</p>
      </div>
      <button class="btn" onclick="descargarInformePDF()">Descargar informe PDF</button>
    </div>

    <div id="graficas" class="tab-content">
      <div class="info-box" id="informe-graficas">
        <canvas id="grafico-aula" width="400" height="200"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    let grupoSeleccionado = null;

    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      for (let i = 0; i < localStorage.length; i++) {
        const clave = localStorage.key(i);
        if (clave.includes(" - ")) {
          const option = document.createElement("option");
          option.value = clave;
          option.textContent = clave;
          select.appendChild(option);
        }
      }
    }

    function cargarInformes() {
      const grupoKey = document.getElementById("grupo-select").value;
      if (!grupoKey) return;

      grupoSeleccionado = JSON.parse(localStorage.getItem(grupoKey));
      
      const individualDiv = document.getElementById("informe-individual");
      individualDiv.innerHTML = '<p>Selecciona un alumno:</p>';
      grupoSeleccionado.alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.className = "btn";
        btn.onclick = () => mostrarInformeAlumno(nombre);
        individualDiv.appendChild(btn);
      });

      const generalHTML = `
        <h3>Grupo: ${grupoSeleccionado.curso}</h3>
        <p>Total de alumnos: ${grupoSeleccionado.alumnos.length}</p>
        <ul>
          <li><strong>Amistades mutuas destacadas:</strong> Ana - Luis, Marta - Carla</li>
          <li><strong>Rechazos múltiples:</strong> Pedro, Elena</li>
          <li><strong>Liderazgo:</strong> Luis</li>
        </ul>
        <p><strong>Recomendaciones:</strong> Trabajar inclusión, empatía y cohesión grupal.</p>
      `;
      document.getElementById("informe-general").innerHTML = generalHTML;

      mostrarGraficoAula();
    }

    function mostrarInformeAlumno(nombre) {
      const div = document.getElementById("informe-individual");
      div.innerHTML = `
        <h3>${nombre}</h3>
        <p><strong>Amistades recibidas:</strong> Luis, Carla</p>
        <p><strong>Rechazos recibidos:</strong> Pedro</p>
        <p><strong>Amistades elegidas:</strong> Marta, Luis</p>
        <p><strong>Posición sociométrica:</strong> Alta integración, múltiples vínculos positivos.</p>
        <canvas id="grafico-${nombre}" width="300" height="200"></canvas>
        <button class="btn" onclick="cargarInformes()">Volver al listado</button>
      `;
      setTimeout(() => {
        const ctx = document.getElementById(`grafico-${nombre}`).getContext("2d");
        new Chart(ctx, {
          type: "bar",
          data: {
            labels: ["Simpatía", "Rechazo", "Popularidad"],
            datasets: [{
              label: "Niveles",
              data: [4, 1, 5],
              backgroundColor: ["#4caf50", "#f44336", "#2196f3"]
            }]
          },
          options: { responsive: true, plugins: { legend: { display: false } } }
        });
      }, 100);
    }

    function mostrarGraficoAula() {
      const ctx = document.getElementById("grafico-aula").getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Simpatía media", "Rechazo medio", "Popularidad media"],
          datasets: [{
            label: "Grupo",
            data: [3.2, 1.1, 2.8],
            backgroundColor: ["#66bb6a", "#ef5350", "#42a5f5"]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            title: { display: true, text: "Valores sociométricos del aula" }
          }
        }
      });
    }

    function descargarInformePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(16);
      doc.text("Informe del Grupo: " + grupoSeleccionado.curso, 10, 20);
      doc.setFontSize(12);
      grupoSeleccionado.alumnos.forEach((alumno, index) => {
        if (index !== 0) doc.addPage();
        doc.text(`Alumno: ${alumno}`, 10, 30);
        doc.text("Amistades: Luis, Carla", 10, 40);
        doc.text("Rechazos: Pedro", 10, 50);
        doc.text("Popularidad: Alta", 10, 60);
        doc.text("Posición sociométrica: Buena", 10, 70);
      });

      doc.save("informe_grupo.pdf");
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
