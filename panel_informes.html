<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes Sociométricos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #fff; }
    header { background-color: #e0f0ff; padding: 20px; text-align: center; }
    header h1 { margin: 0; font-size: 1.8em; color: #007acc; }
    nav { display: flex; justify-content: center; gap: 10px; margin: 10px; flex-wrap: wrap; }
    nav button { padding: 10px 20px; background: #007acc; color: white; border: none; border-radius: 5px; cursor: pointer; }
    nav button:hover { background: #005fa3; }
    section { padding: 20px; display: none; }
    .volver-seleccion { text-align: center; margin: 10px; display: none; }
    .volver-seleccion button { background: #888; color: #fff; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; }
    .cuadro-titulo { background: #f2f8ff; border: 1px solid #aaa; border-radius: 5px; padding: 10px; margin-bottom: 10px; }
    .alumnos-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .alumnos-selector button { flex: 1; min-width: 100px; background: #2196f3; color: white; border: none; border-radius: 5px; padding: 10px; cursor: pointer; }
    canvas { display: block; margin: 0 auto 15px auto; max-width: 90%; }
    .leyenda { font-size: 0.6em; color: #555; text-align: left; margin-top: 10px; max-width: 90%; margin-left: auto; margin-right: auto; }
    .boton-descargar { margin: 10px 0; padding: 8px 16px; background-color: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .boton-descargar:hover { background-color: #3e8e41; }
  </style>
</head>
<body>
  <header>
    <h1>Informes Sociométricos</h1>
  </header>

  <div style="text-align:center; margin:20px;">
    <label for="selectorGrupo">Seleccionar grupo:</label>
    <select id="selectorGrupo" onchange="cargarGrupoSeleccionado()"></select>
    <input type="file" id="inputArchivo" accept="application/json" onchange="leerArchivoGrupo(event)">
  </div>

  <div class="volver-seleccion" id="volverSeleccion">
    <button onclick="volverASeleccionarGrupo()">🔁 Cambiar grupo</button>
  </div>

  <nav id="menuInformes" style="display:none">
    <button onclick="mostrarSeccion('aula')">Informe de Aula</button>
    <button onclick="mostrarSeccion('individual')">Informes Individuales</button>
  </nav>

  <section id="aula">
    <div id="contenidoAula">
      <canvas id="graficoCohesion"></canvas>
      <div id="resumenAula"></div>
      <button class="boton-descargar" onclick="descargarPDF('contenidoAula', 'Informe_Aula.pdf')">Descargar Informe de Aula</button>
    </div>
  </section>

  <section id="individual">
    <div class="alumnos-selector" id="selectorAlumnos"></div>
    <div id="informeAlumnoContainer">
      <div id="informeAlumno"></div>
      <button id="btnDescargarAlumno" class="boton-descargar" style="display:none;" onclick="descargarPDF('informeAlumno', 'Informe_Alumno.pdf')">Descargar Informe Alumno</button>
    </div>
  </section>

<script>
let todosLosGrupos = {};

function leerArchivoGrupo(event) {
  const archivo = event.target.files[0];
  if (!archivo) return;
  const lector = new FileReader();
  lector.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      todosLosGrupos = data;
      const selector = document.getElementById("selectorGrupo");
      selector.innerHTML = "";
      for (const grupo in todosLosGrupos) {
        const option = document.createElement("option");
        option.value = grupo;
        option.textContent = grupo;
        selector.appendChild(option);
      }
      if (Object.keys(todosLosGrupos).length > 0) {
        selector.selectedIndex = 0;
        cargarGrupoSeleccionado();
      }
    } catch (err) {
      alert("Error al leer el archivo JSON");
    }
  };
  lector.readAsText(archivo);
}

function cargarGrupoSeleccionado() {
  const grupoSeleccionado = document.getElementById("selectorGrupo").value;
  const datosGrupo = todosLosGrupos[grupoSeleccionado];
  if (!datosGrupo) return;
  mostrarSeccion('aula');
  document.getElementById("menuInformes").style.display = "flex";
  document.getElementById("volverSeleccion").style.display = "block";
  cargarGraficoAula(datosGrupo.aula);
  generarSelectorAlumnos(datosGrupo.alumnos);
}

function mostrarSeccion(seccion) {
  document.getElementById("aula").style.display = seccion === "aula" ? "block" : "none";
  document.getElementById("individual").style.display = seccion === "individual" ? "block" : "none";
}

function descargarPDF(idElemento, nombreArchivo) {
  const elemento = document.getElementById(idElemento);
  html2pdf()
    .set({ margin: 10, filename: nombreArchivo, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4' } })
    .from(elemento)
    .save();
}

// Aquí puedes reintegrar las funciones cargarGraficoAula y generarSelectorAlumnos como estaban cuando todo funcionaba bien.

</script>
</body>
</html>
