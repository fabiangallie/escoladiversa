<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Informe de Grupo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f7f7f7;
    }

    h1, h2 {
      color: #333;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .section {
      margin-top: 30px;
    }

    label {
      font-weight: bold;
      margin-right: 10px;
    }

    select, input[type="file"] {
      margin-bottom: 20px;
      padding: 5px;
    }

    .informe {
      margin-top: 20px;
    }

    .alumno {
      border-top: 1px solid #ccc;
      padding-top: 10px;
      margin-top: 10px;
    }

    .icono-atencion {
      color: red;
      font-weight: bold;
      margin-left: 5px;
    }

    .propuesta ul {
      padding-left: 20px;
    }

    button {
      padding: 8px 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Informe de Grupo</h1>

    <div class="section">
      <label for="fileInput">Cargar archivo de grupos (.json):</label>
      <input type="file" id="fileInput" accept=".json" />
    </div>

    <div class="section hidden" id="grupoSelectorSection">
      <label for="grupoSelect">Seleccionar grupo:</label>
      <select id="grupoSelect"></select>
      <button onclick="mostrarInforme()">Ver Informe</button>
    </div>

    <div class="section" id="informeContainer"></div>
  </div>

  <script>
    let gruposData = {};

    document.getElementById('fileInput').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          gruposData = JSON.parse(e.target.result);
          const select = document.getElementById('grupoSelect');
          select.innerHTML = '';
          Object.keys(gruposData).forEach(grupo => {
            const option = document.createElement('option');
            option.value = grupo;
            option.textContent = grupo;
            select.appendChild(option);
          });
          document.getElementById('grupoSelectorSection').classList.remove('hidden');
        } catch (err) {
          alert('Error al leer el archivo JSON');
        }
      };
      reader.readAsText(file);
    });

    function mostrarInforme() {
      const grupoNombre = document.getElementById('grupoSelect').value;
      const grupo = gruposData[grupoNombre];
      const contenedor = document.getElementById('informeContainer');
      contenedor.innerHTML = '';

      const resumen = document.createElement('div');
      resumen.classList.add('informe');
      resumen.innerHTML = `
        <h2>Resumen del grupo</h2>
        <p>${grupo.resumen || 'No disponible'}</p>
      `;
      contenedor.appendChild(resumen);

      const propuesta = document.createElement('div');
      propuesta.classList.add('informe', 'propuesta');
      propuesta.innerHTML = `
        <h2>Propuesta de intervención</h2>
        <ul>
          <li><strong>Educación emocional:</strong> Autoconocimiento, gestión emocional, empatía.</li>
          <li><strong>Educación en valores:</strong> Respeto, responsabilidad, solidaridad.</li>
          <li><strong>Grupo y aula:</strong> Normas, resolución de conflictos, cohesión grupal.</li>
        </ul>
      `;
      contenedor.appendChild(propuesta);

      const alumnos = grupo.alumnos || [];
      alumnos.forEach(alumno => {
        const div = document.createElement('div');
        div.classList.add('alumno');
        div.innerHTML = `
          <h3>${alumno.nombre}
            ${alumno.atencion ? '<span class="icono-atencion">⚠️</span>' : ''}
          </h3>
          <p><strong>Observaciones:</strong> ${alumno.observaciones || 'No disponible'}</p>
          <p><strong>Necesidades:</strong> ${alumno.necesidades || 'No disponible'}</p>
        `;
        contenedor.appendChild(div);
      });
    }
  </script>
</body>
</html>
