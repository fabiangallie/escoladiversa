<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes Sociométricos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { background-color: #e0f0ff; padding: 20px; text-align: center; }
    header h1 { margin: 0; color: #007acc; }
    nav { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
    nav button { padding: 10px 20px; background: #007acc; color: white; border: none; border-radius: 5px; cursor: pointer; }
    nav button:hover { background: #005fa3; }
    section { padding: 20px; display: none; }
    .alumnos-selector { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .alumnos-selector button { background: #2196f3; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
    .leyenda { font-size: 0.6em; color: #555; text-align: center; margin-top: 10px; }
    .boton-descargar { margin: 10px 0; padding: 8px 16px; background-color: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer; }
    .boton-descargar:hover { background-color: #3e8e41; }
  </style>
</head>
<body>
  <header>
    <h1>Informes Sociométricos</h1>
  </header>

  <div style="text-align:center; margin:20px;">
    <label for="selectorGrupo">Seleccionar grupo:</label>
    <select id="selectorGrupo" onchange="cargarGrupoSeleccionado()"></select>
    <input type="file" id="inputArchivo" accept="application/json" onchange="leerArchivoGrupo(event)" />
  </div>

  <nav id="menuInformes" style="display:none;">
    <button onclick="mostrarSeccion('aula')">Informe de Aula</button>
    <button onclick="mostrarSeccion('individual')">Informe Individual</button>
  </nav>

  <section id="aula">
    <canvas id="graficoCohesion"></canvas>
    <div class="leyenda">* Índice de cohesión sociométrica por alumno</div>
    <div id="resumenAula"></div>
    <button class="boton-descargar" onclick="descargarPDF('aula', 'informe_aula.pdf')">Descargar Informe de Aula</button>
  </section>

  <section id="individual">
    <div class="alumnos-selector" id="selectorAlumnos"></div>
    <div id="informeAlumno"></div>
    <button class="boton-descargar" id="btnDescargarAlumno" style="display:none;" onclick="descargarPDF('informeAlumno', 'informe_individual.pdf')">Descargar Informe Alumno</button>
  </section>

  <script>
    let todosLosGrupos = {};

    function leerArchivoGrupo(event) {
      const archivo = event.target.files[0];
      if (!archivo) return;
      const lector = new FileReader();
      lector.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          todosLosGrupos = data;
          const selector = document.getElementById("selectorGrupo");
          selector.innerHTML = "";
          for (const grupo in todosLosGrupos) {
            const option = document.createElement("option");
            option.value = grupo;
            option.textContent = grupo;
            selector.appendChild(option);
          }
          selector.selectedIndex = 0;
          cargarGrupoSeleccionado();
        } catch {
          alert("Error al leer el archivo JSON.");
        }
      };
      lector.readAsText(archivo);
    }

    function cargarGrupoSeleccionado() {
      const grupo = document.getElementById("selectorGrupo").value;
      const datos = todosLosGrupos[grupo];
      if (!datos) return;
      document.getElementById("menuInformes").style.display = "flex";
      mostrarSeccion("aula");
      cargarGrafico(datos.aula);
      generarSelectorAlumnos(datos.alumnos);
    }

    function mostrarSeccion(seccion) {
      document.getElementById("aula").style.display = seccion === "aula" ? "block" : "none";
      document.getElementById("individual").style.display = seccion === "individual" ? "block" : "none";
    }

    function cargarGrafico(info) {
      const ctx = document.getElementById("graficoCohesion").getContext("2d");
      if (window.chart) window.chart.destroy();
      window.chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: info.labels,
          datasets: [{ label: "Cohesión", data: info.data, backgroundColor: "#2196f3" }]
        },
        options: {
          responsive: true,
          scales: { y: { beginAtZero: true } }
        }
      });
      document.getElementById("resumenAula").innerHTML = `<div class="bloque">${info.resumen}</div><div class="bloque">${info.propuesta}</div>`;
    }

    function generarSelectorAlumnos(lista) {
      const contenedor = document.getElementById("selectorAlumnos");
      contenedor.innerHTML = "";
      lista.forEach((alumno, i) => {
        const boton = document.createElement("button");
        boton.textContent = alumno.nombre;
        boton.onclick = () => mostrarInformeAlumno(alumno);
        contenedor.appendChild(boton);
      });
    }

    function mostrarInformeAlumno(alumno) {
      const contenedor = document.getElementById("informeAlumno");
      contenedor.innerHTML = `
        <div class="bloque"><strong>${alumno.nombre}</strong></div>
        <div class="bloque">${alumno.resumen}</div>
        <div class="bloque">${alumno.sentimientos}</div>
        <div class="bloque">${alumno.propuesta}</div>
      `;
      document.getElementById("btnDescargarAlumno").style.display = "inline-block";
    }

    function descargarPDF(id, nombre) {
      const elemento = document.getElementById(id);
      html2pdf().from(elemento).save(nombre);
    }
  </script>
</body>
</html>
