<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes Sociométricos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
    }

    header {
      background-color: #1976d2;
      color: white;
      padding: 1em;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #e3f2fd;
      padding: 0.5em;
    }

    nav button {
      margin: 0 1em;
      padding: 0.5em 1em;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    nav button:hover {
      background-color: #1976d2;
    }

    section {
      padding: 2em;
    }

    canvas {
      max-width: 600px;
      margin: 2em auto;
      display: block;
    }

    .boton-descargar {
      margin-top: 1em;
      background-color: #4caf50;
      color: white;
      border: none;
      padding: 0.5em 1em;
      border-radius: 4px;
      cursor: pointer;
    }

    .boton-descargar:hover {
      background-color: #388e3c;
    }

    .alumnos-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1em;
    }

    .alumnos-selector button {
      padding: 0.5em;
      border: none;
      border-radius: 4px;
      background-color: #90caf9;
      color: #0d47a1;
      cursor: pointer;
    }

    .alumnos-selector button:hover {
      background-color: #64b5f6;
    }

    #informeAlumno {
      background-color: #ffffff;
      border: 1px solid #ccc;
      padding: 1em;
      border-radius: 8px;
    }

    .cuadro-titulo {
      background-color: #e3f2fd;
      padding: 0.5em;
      border-left: 6px solid #2196f3;
      margin-bottom: 1em;
    }

    .leyenda {
      font-size: 0.9em;
      color: #555;
    }

    .bloque {
      margin: 1em 0;
    }
  </style>
</head>
<body>
