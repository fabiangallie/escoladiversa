<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5faff;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1em;
    }

    .title-box {
      background-color: #d0e8ff;
      border: 2px solid #a5c7e7;
      border-radius: 12px;
      padding: 1em;
      text-align: center;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
    }

    h1, h2, h3 {
      color: #2b4f77;
    }

    .tabs {
      display: flex;
      justify-content: center;
      margin: 1em 0;
    }

    .tab-btn {
      padding: 0.8em 1.5em;
      margin: 0 0.5em;
      border: none;
      background-color: #d0e4ff;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
    }

    .tab-btn.active {
      background-color: #4285f4;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .info-box {
      background-color: #ffffff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.05);
    }

    canvas {
      max-width: 100%;
      height: auto;
      margin: 1em 0;
    }

    .btn {
      background-color: #e0edff;
      border: 1px solid #9ebee4;
      margin: 0.3em;
      padding: 0.5em 1em;
      border-radius: 6px;
      cursor: pointer;
    }

    .azul-claro {
      background-color: #d0e8ff;
      padding: 0.5em;
      border-radius: 6px;
      box-shadow: inset 1px 1px 4px rgba(0,0,0,0.05);
    }

    .descargar-btn {
      margin-top: 1em;
      background-color: #4caf50;
      color: white;
      border: none;
      padding: 0.6em 1em;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box">
      <h1>Panel de Informes</h1>
    </div>

    <form>
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe de aula</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen del grupo.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      for (let i = 0; i < localStorage.length; i++) {
        const clave = localStorage.key(i);
        if (clave.includes(" - ")) {
          const option = document.createElement("option");
          option.value = clave;
          option.textContent = clave;
          select.appendChild(option);
        }
      }
    }

    function cargarInformes() {
      const grupoKey = document.getElementById("grupo-select").value;
      if (!grupoKey) return;

      const grupo = JSON.parse(localStorage.getItem(grupoKey));
      const individualDiv = document.getElementById("informe-individual");
      individualDiv.innerHTML = '<p>Selecciona un alumno:</p>';

      grupo.alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.className = "btn";
        btn.onclick = () => mostrarInformeIndividual(nombre, grupo);
        individualDiv.appendChild(btn);
      });

      mostrarInformeAula(grupo);
    }

    function mostrarInformeIndividual(nombre, grupo) {
      const div = document.getElementById("informe-individual");
      const data = grupo.resultados[nombre];

      const amistades = data.amistades.join(", ");
      const rechazos = data.rechazos.join(", ");

      div.innerHTML = `
        <div class="azul-claro"><h3>${nombre}</h3></div>
        <p><strong>Amistades:</strong> ${amistades}</p>
        <p><strong>Rechazos:</strong> ${rechazos}</p>
        <p><strong>Resumen:</strong> ${data.resumen}</p>
        <canvas id="graf-${nombre}"></canvas>
      `;

      const ctx = document.getElementById(`graf-${nombre}`).getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Simpatía', 'Rechazo', 'Popularidad'],
          datasets: [{
            label: 'Puntuación',
            data: [data.simpatia, data.rechazo, data.popularidad],
            backgroundColor: ['#4caf50', '#f44336', '#2196f3']
          }]
        },
        options: { responsive: true }
      });
    }

    function mostrarInformeAula(grupo) {
      const div = document.getElementById("informe-general");
      const datos = grupo.analisis;

      div.innerHTML = `
        <div class="azul-claro"><h3>Informe del grupo: ${grupo.curso}</h3></div>
        <p><strong>Número de alumnos:</strong> ${grupo.alumnos.length}</p>
        <p><strong>Cohesión:</strong> ${datos.cohesion}</p>
        <p><strong>Disociación:</strong> ${datos.disociacion}</p>
        <canvas id="graf-cohesion"></canvas>
        <h3>Resumen del clima del aula</h3>
        <p>${datos.resumen}</p>
        <h3>Propuesta de intervención</h3>
        <p><strong>Educación emocional:</strong> ${datos.intervencion.emocional}</p>
        <p><strong>Educación en valores:</strong> ${datos.intervencion.valores}</p>
        <p><strong>Grupo y aula:</strong> ${datos.intervencion.grupo}</p>
      `;

      const ctx = document.getElementById("graf-cohesion").getContext('2d');
      new Chart(ctx, {
        type: 'radar',
        data: {
          labels: ['Cohesión', 'Disociación', 'Afinidad', 'Rechazo'],
          datasets: [{
            label: 'Índices sociométricos',
            data: [datos.cohesion, datos.disociacion, datos.afinidad, datos.rechazo],
            backgroundColor: 'rgba(66, 133, 244, 0.2)',
            borderColor: '#4285f4',
            pointBackgroundColor: '#4285f4'
          }]
        },
        options: { responsive: true }
      });
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
