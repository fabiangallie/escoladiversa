<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .tab-btn.active { background-color: #4285f4; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .btn { margin: 5px; padding: 6px 12px; border-radius: 5px; border: none; background: #4285f4; color: white; cursor: pointer; }
    canvas { max-width: 400px; margin-top: 10px; }
    .info-box { background: #f4faff; border: 1px solid #ccc; border-radius: 8px; padding: 1em; margin-top: 1em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Panel de Informes</h1>
    </div>

    <form class="form">
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe general</button>
      <button class="tab-btn" onclick="mostrarTab('graficas')">Gráficas</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
      <button id="descargar-pdf" style="display:none" class="btn" onclick="descargarTodos()">Descargar todos los informes</button>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen de desempeño del grupo.</p>
      </div>
    </div>

    <div id="graficas" class="tab-content">
      <div class="info-box" id="informe-graficas">
        <p>Gráficas de rendimiento (por implementar).</p>
      </div>
    </div>
  </div>

  <script>
    let grupoActual = null;

    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      for (let i = 0; i < localStorage.length; i++) {
        const clave = localStorage.key(i);
        if (clave.includes(" - ")) {
          const option = document.createElement("option");
          option.value = clave;
          option.textContent = clave;
          select.appendChild(option);
        }
      }
    }

    function cargarInformes() {
      const clave = document.getElementById("grupo-select").value;
      if (!clave) return;
      grupoActual = JSON.parse(localStorage.getItem(clave));
      mostrarListaAlumnos();
      document.getElementById("descargar-pdf").style.display = "inline-block";

      // Informe general básico
      document.getElementById("informe-general").innerHTML = `
        <h3>Grupo: ${grupoActual.curso}</h3>
        <p>Total de alumnos: ${grupoActual.alumnos.length}</p>
        <p>Análisis de aula (por implementar con aspectos destacables).</p>
      `;
    }

    function mostrarListaAlumnos() {
      const cont = document.getElementById("informe-individual");
      cont.innerHTML = "<p>Selecciona un alumno:</p>";
      grupoActual.alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.textContent = nombre;
        btn.onclick = () => mostrarInforme(nombre);
        cont.appendChild(btn);
      });
    }

    function mostrarInforme(nombre) {
      const cont = document.getElementById("informe-individual");
      const datos = grupoActual.resultados[nombre] || {
        simpatias: [],
        rechazos: [],
        popularidad: Math.floor(Math.random() * 10)
      };

      const resumen = `Posición sociométrica: ${datos.simpatias.length >= 3 ? "muy aceptado" : datos.simpatias.length >= 1 ? "aceptado" : "aislado"}.`;

      cont.innerHTML = `
        <h3>${nombre}</h3>
        <p><strong>Amistades:</strong> ${datos.simpatias.join(", ") || "Ninguna"}</p>
        <p><strong>Rechazos:</strong> ${datos.rechazos.join(", ") || "Ninguno"}</p>
        <p><strong>Resumen:</strong> ${resumen}</p>
        <canvas id="graf-${nombre}"></canvas>
        <button class="btn" onclick="mostrarListaAlumnos()">Volver</button>
      `;

      setTimeout(() => {
        new Chart(document.getElementById(`graf-${nombre}`), {
          type: 'bar',
          data: {
            labels: ['Simpatía', 'Rechazo', 'Popularidad'],
            datasets: [{
              label: 'Nivel',
              data: [datos.simpatias.length, datos.rechazos.length, datos.popularidad],
              backgroundColor: ['green', 'red', 'blue']
            }]
          },
          options: { responsive: true, scales: { y: { beginAtZero: true } } }
        });
      }, 200);
    }

    function descargarTodos() {
      alert("Función de descarga de PDF en desarrollo.");
      // Aquí vendría la generación real del PDF con todos los informes individuales
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
