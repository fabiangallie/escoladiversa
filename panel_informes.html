<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .tabs {
      display: flex;
      justify-content: center;
      margin: 1em 0;
    }

    .tab-btn {
      padding: 0.8em 1.5em;
      margin: 0 0.5em;
      border: none;
      background-color: #d0e4ff;
      cursor: pointer;
      border-radius: 8px;
      font-weight: bold;
    }

    .tab-btn.active {
      background-color: #4285f4;
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .info-box {
      background-color: #f4faff;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1em;
      margin-top: 1em;
    }

    canvas {
      max-width: 100%;
    }

    .btn {
      margin: 0.2em;
      padding: 0.5em 1em;
      background: #ddd;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-graph@4.0.0/dist/chartjs-chart-graph.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Panel de Informes</h1>
    </div>

    <form class="form">
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe de aula</button>
      <button class="tab-btn" onclick="mostrarTab('graficas')">Gráficas</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen general del grupo.</p>
      </div>
    </div>

    <div id="graficas" class="tab-content">
      <div class="info-box" id="informe-graficas">
        <p>Gráfico de relaciones sociométricas.</p>
        <canvas id="sociogramaCanvas" width="600" height="400"></canvas>
      </div>
    </div>
  </div>

  <script>
    let grupoActual = null;

    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');

      if (id === 'graficas') {
        setTimeout(renderSociograma, 100);
      }
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      for (let i = 0; i < localStorage.length; i++) {
        const clave = localStorage.key(i);
        if (clave.includes(" - ")) {
          const option = document.createElement("option");
          option.value = clave;
          option.textContent = clave;
          select.appendChild(option);
        }
      }
    }

    function cargarInformes() {
      const grupoKey = document.getElementById("grupo-select").value;
      if (!grupoKey) return;

      grupoActual = JSON.parse(localStorage.getItem(grupoKey));
      const alumnos = grupoActual.alumnos || [];

      const individualDiv = document.getElementById("informe-individual");
      individualDiv.innerHTML = '<p>Selecciona un alumno:</p>';
      alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.className = "btn";
        btn.onclick = () => mostrarInformeAlumno(nombre);
        individualDiv.appendChild(btn);
      });

      document.getElementById("informe-general").innerHTML = `
        <h3>Grupo: ${grupoActual.curso}</h3>
        <p>Total de alumnos: ${alumnos.length}</p>
        <p>Este grupo presenta ciertas dinámicas sociométricas. Se observa...</p>
        <ul>
          <li>Red de relaciones parcialmente equilibrada.</li>
          <li>Existen alumnos con alto nivel de aislamiento.</li>
        </ul>
        <p><strong>Sugerencia de intervención:</strong> fomentar actividades cooperativas que integren a los alumnos con baja popularidad.</p>
      `;
    }

    function mostrarInformeAlumno(nombre) {
      const cont = document.getElementById("informe-individual");
      const datosSimulados = {
        simpatia: Math.floor(Math.random() * 10),
        rechazo: Math.floor(Math.random() * 10),
        popularidad: Math.floor(Math.random() * 10),
        amigos: ["Carlos", "Lucía"],
        rechazados: ["Pedro"]
      };

      cont.innerHTML = `
        <h3>${nombre}</h3>
        <canvas id="grafica-${nombre}" width="400" height="200"></canvas>
        <p><strong>Amistades:</strong> ${datosSimulados.amigos.join(", ")}</p>
        <p><strong>Rechazos:</strong> ${datosSimulados.rechazados.join(", ")}</p>
        <p><strong>Resumen:</strong> ${nombre} se encuentra en una posición ${
          datosSimulados.popularidad > 7 ? "destacada" : datosSimulados.popularidad < 3 ? "aislada" : "media"
        } dentro del grupo.</p>
        <button onclick="cargarInformes()" class="btn">Volver</button>
      `;

      const ctx = document.getElementById(`grafica-${nombre}`).getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Simpatía', 'Rechazo', 'Popularidad'],
          datasets: [{
            label: 'Puntuación',
            data: [datosSimulados.simpatia, datosSimulados.rechazo, datosSimulados.popularidad],
            backgroundColor: ['#4caf50', '#f44336', '#2196f3']
          }]
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true, max: 10 }
          }
        }
      });
    }

    function renderSociograma() {
      const ctx = document.getElementById('sociogramaCanvas').getContext('2d');
      const nodes = grupoActual?.alumnos?.map(n => ({ id: n, r: 10 })) || [];

      const edges = [];
      for (let i = 0; i < nodes.length; i++) {
        const target = nodes[(i + 1) % nodes.length]?.id;
        if (target && nodes[i].id !== target) {
          edges.push({ source: nodes[i].id, target });
        }
      }

      new Chart(ctx, {
        type: 'graph',
        data: {
          labels: nodes.map(n => n.id),
          datasets: [{
            label: 'Relaciones',
            data: nodes,
            edges: edges,
            backgroundColor: 'skyblue',
            borderColor: '#333',
            borderWidth: 1
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          layout: { type: 'force', distance: 100, strength: -300 },
          elements: { line: { borderColor: '#888' } }
        }
      });
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
