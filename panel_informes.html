<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Informes</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .tabs { display: flex; justify-content: center; margin: 1em 0; }
    .tab-btn {
      padding: 0.8em 1.5em; margin: 0 0.5em;
      border: none; background-color: #d0e4ff;
      cursor: pointer; border-radius: 8px; font-weight: bold;
    }
    .tab-btn.active { background-color: #4285f4; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .info-box {
      background-color: #f4faff; border: 1px solid #ccc;
      border-radius: 8px; padding: 1em; margin-top: 1em;
    }
    canvas { max-width: 500px; margin-top: 1em; }
    .btn-volver { margin-top: 1em; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-box azul">
      <h1 class="title-grande">Panel de Informes</h1>
    </div>

    <form class="form">
      <label for="grupo-select">Selecciona un grupo:</label>
      <select id="grupo-select" onchange="cargarInformes()">
        <option value="">-- Elegir grupo --</option>
      </select>
    </form>

    <div class="tabs">
      <button class="tab-btn active" onclick="mostrarTab('individual')">Informe individual</button>
      <button class="tab-btn" onclick="mostrarTab('general')">Informe general</button>
      <button class="tab-btn" onclick="mostrarTab('graficas')">Gráficas</button>
    </div>

    <div id="individual" class="tab-content active">
      <div class="info-box" id="informe-individual">
        <p>Selecciona un alumno del grupo para ver su informe.</p>
      </div>
    </div>

    <div id="general" class="tab-content">
      <div class="info-box" id="informe-general">
        <p>Resumen de desempeño del grupo.</p>
      </div>
    </div>

    <div id="graficas" class="tab-content">
      <div class="info-box" id="informe-graficas">
        <p>Gráficas de clima del aula (por implementar).</p>
      </div>
    </div>

    <button onclick="descargarPDF()" class="tab-btn" style="margin: 2em auto; display: block;">Descargar informe PDF</button>
  </div>

  <script>
    let grupoActual = null;

    function mostrarTab(id) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`.tab-btn[onclick="mostrarTab('${id}')"]`).classList.add('active');
    }

    function cargarGrupos() {
      const select = document.getElementById("grupo-select");
      for (let i = 0; i < localStorage.length; i++) {
        const clave = localStorage.key(i);
        if (clave.includes(" - ")) {
          const option = document.createElement("option");
          option.value = clave;
          option.textContent = clave;
          select.appendChild(option);
        }
      }
    }

    function cargarInformes() {
      const grupoKey = document.getElementById("grupo-select").value;
      if (!grupoKey) return;

      grupoActual = JSON.parse(localStorage.getItem(grupoKey));

      // Individual
      const individualDiv = document.getElementById("informe-individual");
      individualDiv.innerHTML = '<p>Selecciona un alumno:</p>';
      grupoActual.alumnos.forEach(nombre => {
        const btn = document.createElement("button");
        btn.textContent = nombre;
        btn.className = "btn";
        btn.onclick = () => mostrarInformeAlumno(nombre);
        individualDiv.appendChild(btn);
      });

      // General
      document.getElementById("informe-general").innerHTML = `
        <h3>Grupo: ${grupoActual.curso}</h3>
        <p>Total de alumnos: ${grupoActual.alumnos.length}</p>
        <p>Alumnos populares: Juan, María</p>
        <p>Alumnos aislados: Pedro</p>
        <p>Relaciones conflictivas: Andrés vs. Lucía</p>
      `;

      // Gráficas
      const grafDiv = document.getElementById("informe-graficas");
      grafDiv.innerHTML = `<canvas id="graficoAula"></canvas>`;
      new Chart(document.getElementById("graficoAula"), {
        type: 'bar',
        data: {
          labels: ['Aceptación', 'Rechazo', 'Popularidad', 'Aislamiento'],
          datasets: [{
            label: 'Indicadores sociométricos',
            data: [6, 3, 5, 2],
            backgroundColor: ['#4caf50', '#f44336', '#2196f3', '#ff9800']
          }]
        }
      });
    }

    function mostrarInformeAlumno(nombre) {
      const div = document.getElementById("informe-individual");
      div.innerHTML = `
        <h3>${nombre}</h3>
        <p><strong>Amistades:</strong> María, Luis</p>
        <p><strong>Rechazos:</strong> Andrés</p>
        <p><strong>Posición sociométrica:</strong> Alta popularidad y percepción positiva.</p>
        <canvas id="grafico${nombre}"></canvas>
        <button class="btn-volver" onclick="cargarInformes()">Volver a la lista</button>
      `;
      new Chart(document.getElementById(`grafico${nombre}`), {
        type: 'bar',
        data: {
          labels: ['Simpatía', 'Rechazo', 'Popularidad'],
          datasets: [{
            label: 'Puntuaciones',
            data: [8, 2, 9],
            backgroundColor: ['#4caf50', '#f44336', '#2196f3']
          }]
        }
      });
    }

    function descargarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("Informe del grupo", 20, 20);
      doc.text("Resumen de sociometría del grupo. Popularidades, rechazos, indicadores...", 20, 30);
      doc.text("Individual: Juan Pérez - Muy integrado, con múltiples amistades y puntuación alta.", 20, 50);
      doc.text("Individual: Pedro Gómez - Bajo nivel de integración, posibles medidas a considerar.", 20, 60);
      doc.save("informe_grupo.pdf");
    }

    window.onload = cargarGrupos;
  </script>
</body>
</html>
